<!DOCTYPE html>
<html>
<head>
    <title>Mobile Price Predictor</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            margin: 0;
        }

        .header {
            background: #007bff;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            width: 650px;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        .form-group {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }

        label {
            width: 45%;
            text-align: left;
            font-weight: bold;
        }

        input, select {
            width: 50%;
            padding: 8px;
        }

        h2 {
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            font-size: 16px;
            cursor: pointer;
            margin-top: 15px;
        }

        button:hover {
            background: #218838;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e9f7ef;
            border-left: 5px solid #28a745;
        }

        .summary {
            margin-top: 10px;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>📱 Mobile Price Prediction</h1>
</div>

<div class="container">

<form action="{{ url_for('predict_datapoint') }}" method="post">

<h2>🔧 Specifications</h2>

<div class="form-group">
    <label>Battery Power</label>
    <input type="number" name="battery_power" required>
</div>

<div class="form-group">
    <label>Clock Speed</label>
    <input type="number" step="any" name="clock_speed" required>
</div>

<div class="form-group">
    <label>Front Camera (MP)</label>
    <input type="number" name="fc" required>
</div>

<div class="form-group">
    <label>Internal Memory (GB)</label>
    <input type="number" name="int_memory" required>
</div>

<div class="form-group">
    <label>Mobile Depth</label>
    <input type="number" name="m_dep" required>
</div>

<div class="form-group">
    <label>Mobile Weight</label>
    <input type="number" name="mobile_wt" required>
</div>

<div class="form-group">
    <label>Number of Cores</label>
    <input type="number" name="n_cores" required>
</div>

<div class="form-group">
    <label>Primary Camera (MP)</label>
    <input type="number" name="pc" required>
</div>

<div class="form-group">
    <label>Pixel Height</label>
    <input type="number" name="px_height" required>
</div>

<div class="form-group">
    <label>Pixel Width</label>
    <input type="number" name="px_width" required>
</div>

<div class="form-group">
    <label>RAM (MB)</label>
    <input type="number" name="ram" required>
</div>

<div class="form-group">
    <label>Screen Height</label>
    <input type="number" name="sc_h" required>
</div>

<div class="form-group">
    <label>Screen Width</label>
    <input type="number" name="sc_w" required>
</div>

<div class="form-group">
    <label>Talk Time</label>
    <input type="number" name="talk_time" required>
</div>

<h2>📶 Features</h2>

<div class="form-group">
    <label>Bluetooth</label>
    <select name="blue" required>
        <option value="">Select</option>
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>
</div>

<div class="form-group">
    <label>Dual SIM</label>
    <select name="dual_sim" required>
        <option value="">Select</option>
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>
</div>

<div class="form-group">
    <label>4G Support</label>
    <select name="four_g" required>
        <option value="">Select</option>
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>
</div>

<div class="form-group">
    <label>3G Support</label>
    <select name="three_g" required>
        <option value="">Select</option>
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>
</div>

<div class="form-group">
    <label>Touch Screen</label>
    <select name="touch_screen" required>
        <option value="">Select</option>
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>
</div>

<div class="form-group">
    <label>WiFi</label>
    <select name="wifi" required>
        <option value="">Select</option>
        <option value="1">Yes</option>
        <option value="0">No</option>
    </select>
</div>

<button type="submit">🚀 Predict Price Range</button>

</form>

{% if results %}
<div class="result">
    <h2>🎯 Prediction: {{ results }}</h2>

    <div class="summary">
        <h3>Your Inputs</h3>
        {% for key, value in request.form.items() %}
            <p><strong>{{ key }}:</strong> {{ value }}</p>
        {% endfor %}
    </div>
</div>
{% endif %}

</div>

</body>
</html>
